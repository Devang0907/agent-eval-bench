id: efficiency/low-tool-count
name: "Low Tool Count"
description: "Solve with minimal tools"
difficulty: medium
category: efficiency
prompt: |
  Create eff.txt with "efficient".
repository:
  files: {}
expected:
  files:
    - path: eff.txt
      exists: true
validators:
  - name: max-tool-calls
    params:
      max: 5
  - name: max-cost
    params:
      max: 0.5
timeout: 180000
