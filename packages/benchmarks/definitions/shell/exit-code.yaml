id: shell/exit-code
name: "Respect Exit Codes"
description: "Create success.txt only after a successful command"
difficulty: medium
category: shell
prompt: |
  Run node -e "process.exit(0)" then create success.txt.
repository:
  files: {}
expected:
  files:
    - path: success.txt
      exists: true
validators:
  - name: file-exists
    params:
      path: "success.txt"
timeout: 180000
