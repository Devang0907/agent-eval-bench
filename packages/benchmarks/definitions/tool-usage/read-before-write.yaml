id: tool-usage/read-before-write
name: "Read Before Write"
description: "Read existing file before modifying"
difficulty: medium
category: tool-usage
prompt: |
  Read config.json and set mode to prod.
repository:
  files:
    "config.json": "{\"mode\":\"dev\"}\n"
expected:
  files:
    - path: config.json
      contains: "prod"
validators:
  - name: file-contains
    params:
      path: "config.json"
      contains: "prod"
timeout: 180000
