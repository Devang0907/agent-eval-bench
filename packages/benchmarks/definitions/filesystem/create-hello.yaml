id: filesystem/create-hello
name: "Create Hello File"
description: "Basic file creation"
difficulty: easy
category: filesystem
prompt: |
  Create a file called hello.txt with content hello
repository:
  files: {}
expected:
  files:
    - path: hello.txt
      exists: true
      contains: "hello"
validators:
  - name: file-exists
    params:
      path: "hello.txt"
timeout: 180000
