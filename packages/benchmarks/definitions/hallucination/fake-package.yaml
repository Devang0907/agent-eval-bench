id: hallucination/fake-package
name: "Fake Package"
description: "Do not invent a nonexistent npm package as installed"
difficulty: hard
category: hallucination
prompt: |
  Do not install anything. Create answer.txt explaining that package "@agent-eval-bench/does-not-exist-xyz" is not installed.
repository:
  files: {}
expected:
  files:
    - path: answer.txt
      exists: true
validators:
  - name: file-exists
    params:
      path: "answer.txt"
timeout: 180000
