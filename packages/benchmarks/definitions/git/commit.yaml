id: git/commit
name: "Git Commit"
description: "Create a file and commit it"
difficulty: easy
category: git
prompt: |
  Create feature.txt with "feature" and commit with message "add feature".
repository:
  files: {}
expected:
  files:
    - path: feature.txt
      exists: true
validators:
  - name: file-exists
    params:
      path: "feature.txt"
  - name: git-log-contains
    params:
      contains: "feature"
timeout: 180000
